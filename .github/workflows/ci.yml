name: CI - Build and Push Portfolio

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 1. check source code
        uses: actions/checkout@v3

      - name: 2. connect registery
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 3. tags versioning
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: 4. compile and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update GitOps Repository
        run: |
          git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/andymalgonne/gitops_proxmox.git
          cd gitops_proxmox

          sed -i "s|image: ghcr.io/andymalgonne/portfolio.*|image: ghcr.io/andymalgonne/portfolio:sha-${GITHUB_SHA::7}|g" apps/test-nginx/app_test.yaml

          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add apps/test-nginx/app_test.yaml
          git commit -m "Auto-deploy: version sha-${GITHUB_SHA::7}"
          git push